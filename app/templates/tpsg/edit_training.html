{% extends "base.html" %}

{% block title %}Edit Training | TPS-G Admin{% endblock %}

{% block extra_css %}
<style>
    .edit-container {
        max-width: 600px;
        margin: 0 auto;
    }

    .content-card {
        background: white;
        border: 1px solid var(--gray-200);
        border-radius: var(--radius-lg);
        padding: 30px;
        box-shadow: var(--shadow-sm);
    }

    .card-title {
        font-size: 14px;
        font-weight: 700;
        color: var(--gray-900);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 25px;
        padding-bottom: 15px;
        border-bottom: 1px solid var(--gray-100);
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .form-group {
        margin-bottom: 16px;
    }

    .form-label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: var(--gray-500);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 6px;
    }

    .form-control {
        width: 100%;
        background: var(--gray-50);
        border: 1px solid var(--gray-200);
        border-radius: var(--radius);
        padding: 10px 14px;
        font-size: 14px;
        color: var(--gray-800);
        transition: all 0.2s;
    }

    .form-control:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(31, 78, 159, 0.1);
        background: white;
    }

    .btn-group {
        display: flex;
        gap: 12px;
        margin-top: 24px;
    }

    .btn-primary-custom {
        flex: 1;
        background: var(--primary);
        color: white;
        border: none;
        padding: 14px;
        border-radius: var(--radius);
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }

    .btn-primary-custom:hover {
        background: var(--primary-dark);
    }

    .btn-cancel {
        flex: 1;
        background: var(--gray-100);
        color: var(--gray-600);
        border: 1px solid var(--gray-200);
        padding: 14px;
        border-radius: var(--radius);
        font-weight: 600;
        text-decoration: none;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-size: 14px;
        transition: all 0.2s;
    }

    .btn-cancel:hover {
        background: var(--gray-200);
        color: var(--gray-800);
    }
</style>
{% endblock %}

{% block content %}
<div class="edit-container">
    <div style="margin-bottom: 20px;">
        <a href="{{ url_for('tpsg.manage_trainings') }}" style="color: var(--gray-500); text-decoration: none; font-size: 13px; font-weight: 600;">
            <i class="fas fa-arrow-left"></i> Back to Training Schedules
        </a>
    </div>

    <div class="content-card">
        <h3 class="card-title">
            <i class="fas fa-edit" style="color: var(--primary);"></i> Edit Training Schedule
        </h3>

        <form action="{{ url_for('tpsg.edit_training', id=training.id) }}" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="form-group">
                <label class="form-label">Training Title</label>
                <input type="text" name="title" class="form-control" value="{{ training.title }}" required>
            </div>

            <div class="form-group">
                <label class="form-label">Date & Time</label>
                <input type="datetime-local" name="training_date" class="form-control"
                    value="{{ training.training_date.strftime('%Y-%m-%dT%H:%M') }}" required>
            </div>

            <div class="form-group">
                <label class="form-label">Location</label>
                <input type="text" name="location" class="form-control" value="{{ training.location }}" required>
            </div>

            <div class="form-group">
                <label class="form-label">Participant Quota</label>
                <input type="number" name="quota" class="form-control" value="{{ training.quota }}" min="0">
            </div>

            <div class="form-group">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" rows="3">{{ training.description }}</textarea>
            </div>

            <div class="btn-group">
                <button type="submit" class="btn-primary-custom">
                    <i class="fas fa-save"></i> Save Changes
                </button>
                <a href="{{ url_for('tpsg.manage_trainings') }}" class="btn-cancel">
                    <i class="fas fa-times"></i> Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
