{% extends "base.html" %}

{% block title %}Edit Announcement | TPS-G Admin{% endblock %}

{% block extra_css %}
<style>
    .edit-container {
        max-width: 700px;
        margin: 0 auto;
    }

    .content-card {
        background: white;
        border: 1px solid var(--gray-200);
        border-radius: var(--radius-lg);
        padding: 30px;
        box-shadow: var(--shadow-sm);
    }

    .card-title {
        font-size: 14px;
        font-weight: 700;
        color: var(--gray-900);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 25px;
        padding-bottom: 15px;
        border-bottom: 1px solid var(--gray-100);
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .form-group {
        margin-bottom: 16px;
    }

    .form-label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: var(--gray-500);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 6px;
    }

    .form-control {
        width: 100%;
        background: var(--gray-50);
        border: 1px solid var(--gray-200);
        border-radius: var(--radius);
        padding: 10px 14px;
        font-size: 14px;
        color: var(--gray-800);
        transition: all 0.2s;
    }

    .form-control:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(31, 78, 159, 0.1);
        background: white;
    }

    .checkbox-list {
        max-height: 200px;
        overflow-y: auto;
        background: var(--gray-50);
        padding: 10px;
        border-radius: var(--radius);
        border: 1px solid var(--gray-200);
    }

    .checkbox-item {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 13px;
        color: var(--gray-700);
        padding: 8px 6px;
        border-bottom: 1px solid var(--gray-100);
        cursor: pointer;
    }

    .checkbox-item:last-child {
        border-bottom: none;
    }

    .checkbox-item:hover {
        background: var(--gray-100);
    }

    .btn-group {
        display: flex;
        gap: 12px;
        margin-top: 24px;
    }

    .btn-primary-custom {
        flex: 1;
        background: var(--primary);
        color: white;
        border: none;
        padding: 14px;
        border-radius: var(--radius);
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }

    .btn-primary-custom:hover {
        background: var(--primary-dark);
    }

    .btn-cancel {
        flex: 1;
        background: var(--gray-100);
        color: var(--gray-600);
        border: 1px solid var(--gray-200);
        padding: 14px;
        border-radius: var(--radius);
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        text-decoration: none;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-size: 14px;
    }

    .btn-cancel:hover {
        background: var(--gray-200);
        color: var(--gray-800);
    }
</style>
{% endblock %}

{% block content %}
<div class="edit-container">
    <div style="margin-bottom: 20px;">
        <a href="{{ url_for('tpsg.manage_news') }}" style="color: var(--gray-500); text-decoration: none; font-size: 13px; font-weight: 600;">
            <i class="fas fa-arrow-left"></i> Back to Announcements
        </a>
    </div>

    <div class="content-card">
        <h3 class="card-title">
            <i class="fas fa-edit" style="color: var(--primary);"></i> Edit Announcement
        </h3>

        <form action="{{ url_for('tpsg.edit_news', id=news_item.id) }}" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="form-group">
                <label class="form-label">Announcement Title</label>
                <input type="text" name="title" class="form-control" value="{{ news_item.title }}" required>
            </div>

            <div class="form-group">
                <label class="form-label">Category</label>
                <select name="category" class="form-control">
                    <option value="News" {% if news_item.category == 'News' %}selected{% endif %}>News / Information</option>
                    <option value="Schedule" {% if news_item.category == 'Schedule' %}selected{% endif %}>Activity Schedule</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Target Audience</label>
                <div style="display: flex; gap: 16px; font-size: 13px; color: var(--gray-700); margin-top: 6px;">
                    <label style="cursor: pointer; display: flex; align-items: center; gap: 6px;">
                        <input type="radio" name="target_type" value="all" {% if news_item.target_type == 'all' %}checked{% endif %} onchange="toggleTarget()"> All Participants
                    </label>
                    <label style="cursor: pointer; display: flex; align-items: center; gap: 6px;">
                        <input type="radio" name="target_type" value="specific" {% if news_item.target_type == 'specific' %}checked{% endif %} onchange="toggleTarget()"> Specific Participants
                    </label>
                </div>
            </div>

            <div class="form-group" id="participant-selection" style="{% if news_item.target_type == 'specific' %}display: block;{% else %}display: none;{% endif %}">
                <label class="form-label" style="color: var(--warning);">Search & Select Participants</label>
                <input type="text" id="searchParticipantInput" class="form-control" placeholder="Type name or NPK to search..." onkeyup="filterParticipants()" style="margin-bottom: 8px;">
                <div class="checkbox-list" id="participantCheckboxList">
                    {% for emp in employees %}
                    <label class="checkbox-item">
                        <input type="checkbox" name="target_users" value="{{ emp.username }}"
                            {% if emp.username in news_item.target_users %}checked{% endif %}>
                        <span>{{ emp.name }}</span>
                        <span style="color: var(--gray-400); font-family: monospace; font-size: 11px;">({{ emp.username }})</span>
                    </label>
                    {% endfor %}
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Content</label>
                <textarea name="content" class="form-control" rows="6" required>{{ news_item.content }}</textarea>
            </div>

            <div class="btn-group">
                <button type="submit" class="btn-primary-custom">
                    <i class="fas fa-save"></i> Save Changes
                </button>
                <a href="{{ url_for('tpsg.manage_news') }}" class="btn-cancel">
                    <i class="fas fa-times"></i> Cancel
                </a>
            </div>
        </form>
    </div>
</div>

<script>
function toggleTarget() {
    const specificRadio = document.querySelector('input[name="target_type"][value="specific"]');
    const participantBox = document.getElementById('participant-selection');
    participantBox.style.display = specificRadio.checked ? 'block' : 'none';
}

function filterParticipants() {
    const input = document.getElementById('searchParticipantInput').value.toUpperCase();
    const labels = document.querySelectorAll('.checkbox-item');
    labels.forEach(label => {
        const text = label.textContent.toUpperCase();
        label.style.display = text.includes(input) ? 'flex' : 'none';
    });
}
</script>
{% endblock %}
